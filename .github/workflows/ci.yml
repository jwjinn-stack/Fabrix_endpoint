name: ci

# PR·푸시에서 회귀 게이트: 백엔드 go vet/test + 프론트 tsc/lint/test.
# (이미지 빌드는 build-and-push.yml — 이 체크 통과 후에만 실행되도록 그쪽 needs 로 묶음)
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
      - run: go test ./...

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc -p tsconfig.json --noEmit
      - run: npm run lint
      - run: npm test
