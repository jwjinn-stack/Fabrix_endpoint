name: build-and-push

# 우리 워크로드 이미지를 GHCR로 빌드·푸시. 클러스터는 이 이미지를 pull.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "web/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # 회귀 게이트 — 이미지 빌드 전 백엔드/프론트 검증 통과 필수(IMP-11).
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
        working-directory: ./backend
      - run: go test ./...
        working-directory: ./backend
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: ./web
      - run: npx tsc -p tsconfig.json --noEmit
        working-directory: ./web
      - run: npm run lint
        working-directory: ./web
      - run: npm test
        working-directory: ./web

  build:
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: web
            context: ./web
    steps:
      - uses: actions/checkout@v4

      # buildx 빌더(docker-container 드라이버) 셋업 — 이게 없으면 기본 docker 드라이버라
      # cache-to: type=gha 가 "Cache export is not supported for the docker driver" 로 실패한다.
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fabrix-endpoint-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
