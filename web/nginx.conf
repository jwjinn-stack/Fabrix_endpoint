# 정적 SPA 서빙 + /api 를 같은 네임스페이스의 fabrix-api 서비스로 프록시(동일 오리진).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API 프록시 → fabrix-api:8080 (ns fabrix-endpoint 내부 DNS)
  location /api/ {
    proxy_pass http://fabrix-api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  # SPA 라우팅 폴백
  location / {
    try_files $uri $uri/ /index.html;
  }
}
