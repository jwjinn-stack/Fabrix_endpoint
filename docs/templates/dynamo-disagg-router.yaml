# ─────────────────────────────────────────────────────────────────────────
# FABRIX Endpoint — DynamoGraphDeployment 템플릿 ③ 분리(disagg_router)
# 용도: 고성능/대규모 (prefill ↔ decode 워커 분리 + NIXL KV 전송)
# 효과: prefill·decode 자원 독립 스케일. NVIDIA 보고 최대 ~7x 처리량(DeepSeek R1/Blackwell 기준)
# 적합: 긴 입력(RAG, 문서분석) 워크로드. 통합문서 PDF Use case 4
# ⚠ disagg 연결(NIXL)·워커 역할 필드는 Dynamo 버전별 상이 — 공식 문서 필수 확인
# ─────────────────────────────────────────────────────────────────────────
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: qwen3-30b-disagg
  namespace: vllm-prod-stack
  labels:
    fabrix.app_id: "research-doc-rag"
    fabrix.dept_id: "D-RESEARCH"
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 2
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:latest
          command: ["python3", "-m", "dynamo.frontend"]
          args:
            - "--http-port=8000"
            - "--router-mode=kv"
            - "--router-session-key=x-user-id"
          envFromSecret: fabrix-vllm-api-keys

    # ── Prefill 워커(입력 토큰 KV 계산 전담) ──────────────────────
    VllmPrefillWorker:
      componentType: worker
      replicas: 2
      resources:
        limits:
          gpu: "1"
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:latest
          command: ["python3", "-m", "dynamo.vllm"]
          args:
            - "--model=Qwen/Qwen3-30B-A3B-Thinking-2507-FP8"
            - "--served-model-name=Qwen/Qwen3-30B-A3B"
            - "--max-model-len=16384"
            - "--is-prefill-worker"          # ⚠ prefill 역할 플래그(버전별 명칭 확인)
          volumeMounts:
            - { name: model-cache, mountPath: /data }
          startupProbe:
            httpGet: { path: /health, port: 8000 }
            failureThreshold: 60
            periodSeconds: 10

    # ── Decode 워커(생성 단계 전담, prefill로부터 KV 수신) ─────────
    VllmDecodeWorker:
      componentType: worker
      replicas: 4                            # decode를 더 많이(생성이 더 오래 걸림)
      resources:
        limits:
          gpu: "1"
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:latest
          command: ["python3", "-m", "dynamo.vllm"]
          args:
            - "--model=Qwen/Qwen3-30B-A3B-Thinking-2507-FP8"
            - "--served-model-name=Qwen/Qwen3-30B-A3B"
            - "--max-model-len=16384"
            # decode는 기본 역할. NIXL로 prefill KV 수신(Operator/런타임이 연결)
          volumeMounts:
            - { name: model-cache, mountPath: /data }
          startupProbe:
            httpGet: { path: /health, port: 8000 }
            failureThreshold: 60
            periodSeconds: 10

  # 공유 볼륨(모든 워커가 동일 가중치 마운트)
  volumes:
    - name: model-cache
      persistentVolumeClaim:
        claimName: vllm-model-weights-claim

  planner:
    enabled: true
    slo:
      ttft_p95_ms: 500                       # 긴 입력 → TTFT 목표 완화
    # prefill/decode 독립 스케일(확인 필요: per-component 스케일 지원 여부)
    minReplicas: 2
    maxReplicas: 12
    scaleDownCooldownSeconds: 300
