# ─────────────────────────────────────────────────────────────────────────
# FABRIX Endpoint — 세션쿠키 → x-user-id 변환 (D-4 대안)
# 문제: 프론트앱 수정 권한이 없어 x-user-id(sessionID)를 못 실어주는 경우.
# 해결: 게이트웨이(Envoy)에서 요청의 세션 쿠키를 읽어 x-user-id 헤더로 주입.
#        → 가드레일 증적(Part2)·세션 라우팅 어피니티(D-1)가 sessionID를 그대로 사용.
#
# ★ 배치 순서(중요): 이 필터는 반드시 ext_proc(Semantic Router)·라우터보다 "앞"에서
#    실행돼야 함. 그래야 가드레일 헤더 수집과 KV 세션 라우팅이 동일 sessionID를 본다.
#
# ⚠ 게이트웨이 종류에 따라 래퍼가 다름 — 아래 (A)/(B)/(C) 중 환경에 맞는 것 선택:
#    (A) Envoy Gateway(Gateway API, vLLM AI Gateway 기본) → EnvoyExtensionPolicy
#    (B) Istio → EnvoyFilter
#    (C) 순수 Envoy → http_filters에 lua 필터 직접 삽입
#    Lua 본문은 셋 다 동일. 어떤 게이트웨이인지 확인 필요(통합문서 §6).
# ─────────────────────────────────────────────────────────────────────────

# ===== (A) Envoy Gateway — EnvoyExtensionPolicy (권장) =====
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: fabrix-session-to-userid
  namespace: vllm-prod-stack
spec:
  # 이 정책이 붙을 Gateway/HTTPRoute (AI Gateway 라우트 대상)
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: vllm-inference-route        # ⚠ 실제 라우트 이름으로 교체
  lua:
    - inlineString: |
        -- 세션 쿠키명: 사내 SSO/세션 쿠키에 맞춰 교체 (예: JSESSIONID, FABRIXSESSION)
        local COOKIE_NAME = "FABRIXSESSION"

        local function get_cookie(cookie_header, name)
          if not cookie_header then return nil end
          -- "a=1; b=2; FABRIXSESSION=abc" 에서 값 추출
          for kv in string.gmatch(cookie_header, "([^;]+)") do
            local k, v = string.match(kv, "^%s*([^=]+)=(.+)$")
            if k == name then return v end
          end
          return nil
        end

        function envoy_on_request(handle)
          local h = handle:headers()

          -- 1) 이미 x-user-id가 있으면 존중(프론트가 직접 실은 경우 우선)
          if h:get("x-user-id") then return end

          -- 2) 세션 쿠키에서 sessionID 추출
          local cookie = h:get("cookie")
          local sid = get_cookie(cookie, COOKIE_NAME)

          if sid and #sid > 0 then
            -- 라우팅/증적용 상관관계 핸들로 주입 (원값 해시는 audit-ingestor가 수행)
            h:replace("x-user-id", sid)
            -- 출처 표식(선택): 증적에서 'session_only' 판별에 활용
            h:replace("x-fabrix-userid-source", "session-cookie")
          end
          -- 쿠키도 없으면 무주입 → 다운스트림에서 user_ref=null, load-balance 폴백(D-2)
        end
---
